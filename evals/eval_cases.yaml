# ═══════════════════════════════════════════════════════════════════════════════
# EDGE CASES (13 cases)
# Missing data, boundary conditions, unusual inputs
# ═══════════════════════════════════════════════════════════════════════════════

- id: no_hallucination_holdings
  question: 'Do I own any Tesla stock?'
  expected_tools: ['portfolio_analysis']
  # BUG FIX: Old assertion 'not_contains: you own' would fail on "you don't own"
  # because "you don't own" contains the substring "you own". Instead, assert
  # the model correctly indicates the user does NOT own Tesla.
  assertions:
    - type: tool_used
      value: portfolio_analysis
    - type: contains_any
      value: "don't own|do not own|not in your portfolio|don't have|don't hold|no Tesla|no TSLA|not found|don't see"
    - type: no_error
  category: edge_case
  difficulty: medium

- id: unknown_symbol
  question: 'What is the price of XYZABC123?'
  expected_tools: ['market_data']
  assertions:
