# Eval cases for the Ghostfolio AI Agent.
# Each case tests a question against a known mock portfolio (3 accounts, 85 activities).
#
# Assertion types:
#   contains           - response must contain the value string (case-insensitive)
#   contains_any       - response must contain ANY of the pipe-separated values (case-insensitive)
#   not_contains       - response must NOT contain the value string
#   tool_used          - the named tool must appear in tool_calls
#   tool_not_used      - the named tool must NOT appear in tool_calls
#   has_number         - response must contain at least one numeric value
#   no_error           - response must not indicate an error
#   tool_param_equals  - tool called with exact param value (e.g. 'portfolio_analysis.view=performance')
#   tool_param_contains - tool param contains substring (e.g. 'portfolio_analysis.symbols=AAPL')
#   no_tools_used      - zero tools were called
#   min_tool_calls     - at least N distinct tools called (e.g. '2')
#
# Categories (rubric types):
#   happy_path, edge_case, adversarial, multi_step

# ═══════════════════════════════════════════════════════════════════════════════
# HAPPY PATH (49 cases)
# Standard successful queries with expected outcomes
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Portfolio Analysis ──────────────────────────────────────────────────────

- id: portfolio_overview
  question: "What's in my portfolio?"
  expected_tools: ['portfolio_analysis']
  assertions:
    - type: tool_used
      value: portfolio_analysis
    - type: contains
      value: 'AAPL'
    - type: contains
      value: 'VOO'
    - type: contains_any
      value: 'bitcoin|BTC'
    - type: no_error
  category: happy_path
  difficulty: easy

